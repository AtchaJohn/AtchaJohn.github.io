            text-align: center; 
        }
        h1 {

        }
        .thumbnails {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .thumbnail {
            text-decoration: none;
            color: inherit;
        }
        .thumbnail img {
            width: 100%;
            height: 240px;
            object-fit: contain;
            border: 1px solid #444;
            transition: transform 0.3s;
        }
        .thumbnail:hover img {
            transform: scale(1.03);
        }
        .thumbnail p {
            margin-top: 12px;
            font-size: 1.1em;
        }
    </style>
</head>
